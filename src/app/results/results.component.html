<mat-card appearance="outlined">
  <mat-card-header class="center-header">
    <mat-card-title>Results</mat-card-title>
  </mat-card-header>
  <div class="column-headers">
    <span>First Game</span>
    <span>Second Game</span>
    <span>Dealers</span>
  </div>
  <mat-divider></mat-divider>
  <div class="columns">
    <div class="column">
      <app-autocomplete-field
        *ngFor="let num of gameOne; let i = index"
        [number]="num"
        [control]="data.gameOne[i]"
        [options]="names">
      </app-autocomplete-field>
    </div>
    <div class="column">
      <app-autocomplete-field
        *ngFor="let num of gameTwo; let i = index"
        [number]="num"
        [control]="data.gameTwo[i]"
        [options]="names">
      </app-autocomplete-field>
    </div>
    <div class="column">
      <app-autocomplete-field
        *ngFor="let control of data.dealers; let i = index"
        [control]="control"
        [options]="dealers">
      </app-autocomplete-field>
    </div>
  </div>
</mat-card>
